# ============================================
# AI模拟炒股大师 - 主配置文件
# ============================================

spring:
  profiles:
    active: dev  # 默认激活开发环境
  application:
    name: ai-stock-simulator-backend

# 服务器配置
server:
  port: 8081
  servlet:
    context-path: /api

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true  # 下划线转驼峰
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 开发环境打印SQL
  global-config:
    db-config:
      id-type: auto  # 主键自增
      logic-delete-field: deleted  # 逻辑删除字段
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

# SpringDoc OpenAPI (Swagger) 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# 日志配置
logging:
  level:
    root: INFO
    com.tangl.aistocksimulatorbackend: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# JWT 配置
jwt:
  secret: ${JWT_SECRET:ai-stock-simulator-secret-key-2026-very-long-string-for-security}
  access-token-expiration: 900000  # 15分钟（毫秒）
  refresh-token-expiration: 604800000  # 7天（毫秒）

# AI 服务配置
ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:8000}
    timeout: 30000  # 30秒超时

# 交易配置
trade:
  commission-rate: 0.0003  # 佣金率：万分之三
  min-commission: 5.0  # 最低佣金：5元
  stamp-duty-rate: 0.001  # 印花税率：千分之一（仅卖出）
  max-position-ratio: 0.3  # 单只股票最大持仓比例：30%
